<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Playground · Code Runner</title>
<meta name="description" content="Online code playground — tulis & jalanin code di 35+ bahasa: JavaScript, Python, Ruby, Java, Go, Rust, C, C++, C#, PHP, dan banyak lagi. Plus live preview HTML." />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='24' fill='%232f6df6'/%3E%3Cpath d='M40 32 L70 50 L40 68 Z' fill='%23fff'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
<script>try{document.documentElement.setAttribute('data-theme',localStorage.getItem('pg-theme')||'light')}catch(e){document.documentElement.setAttribute('data-theme','light')}</script>
<style>
  /* Hallmark · macrostructure: Workbench (tool shell) · genre: modern-minimal
   * theme: custom "Minimal Mono" — neutral grayscale + one calm blue accent
   *   · symmetric 50/50 split · Inter + JetBrains Mono · light & dark toggle
   * pre-emit critique: P5 H5 E4 S4 R5 V4
   */
  :root{
    /* ── light ── */
    --paper-0:oklch(98.4% 0 0);  --paper-1:oklch(100% 0 0);  --paper-2:oklch(97% 0 0);  --paper-3:oklch(94.5% 0 0);
    --ink:oklch(25% 0 0);        --ink-dim:oklch(48% 0 0);   --ink-faint:oklch(64% 0 0);
    --line:oklch(92.5% 0 0);     --line-2:oklch(87% 0 0);
    --accent:oklch(54% .18 256); --accent-hover:oklch(48% .18 256);  --on-accent:oklch(100% 0 0);
    --ok:oklch(53% .14 156);     --danger:oklch(56% .19 25);  --editor-card:var(--paper-1);  --focus:oklch(54% .18 256);
    /* type */
    --font-ui:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    --font-mono:'JetBrains Mono',ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace;
    /* space + text */
    --space-1:4px; --space-2:8px; --space-3:12px; --space-4:16px; --space-5:20px; --space-6:24px;
    --text-xs:11px; --text-sm:12px; --text-base:13px; --text-md:14px;
    --radius-sm:6px; --radius:8px;
    --ease-out:cubic-bezier(.2,.7,.2,1); --dur:.14s;
  }
  [data-theme="dark"]{
    --paper-0:oklch(20.5% .004 265);  --paper-1:oklch(24% .005 265);  --paper-2:oklch(28% .006 265);  --paper-3:oklch(32% .006 265);
    --ink:oklch(93% 0 0);             --ink-dim:oklch(70% 0 0);       --ink-faint:oklch(55% 0 0);
    --line:oklch(31% .005 265);       --line-2:oklch(40% .006 265);
    --accent:oklch(66% .15 256);      --accent-hover:oklch(72% .15 256);  --on-accent:oklch(20% .01 265);
    --ok:oklch(72% .14 156);          --danger:oklch(72% .16 25);     --editor-card:oklch(22% .004 265);  --focus:oklch(66% .15 256);
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;overflow-x:clip}
  body{background:var(--paper-0);color:var(--ink);font-family:var(--font-ui);
    display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased;
    transition:background .2s var(--ease-out),color .2s var(--ease-out)}

  /* ── header ── */
  header{display:flex;align-items:center;gap:var(--space-3);padding:0 var(--space-4);
    height:52px;flex:0 0 auto;background:var(--paper-1);border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:9px;white-space:nowrap}
  .brand .token{width:18px;height:18px;border-radius:5px;background:var(--accent);position:relative;flex:0 0 auto}
  .brand .token::after{content:'';position:absolute;left:6px;top:5px;
    border-left:6px solid var(--on-accent);border-top:4px solid transparent;border-bottom:4px solid transparent}
  .wordmark{font-weight:600;font-size:14.5px;letter-spacing:-.01em;color:var(--ink)}
  .divider{width:1px;height:20px;background:var(--line-2);flex:0 0 auto}
  .spacer{flex:1}

  .runtime{display:flex;align-items:center;gap:9px}
  .sel-wrap{position:relative;display:inline-flex;align-items:center}
  .sel-wrap::after{content:'';position:absolute;right:12px;width:6px;height:6px;
    border-right:1.5px solid var(--ink-faint);border-bottom:1.5px solid var(--ink-faint);
    transform:rotate(45deg) translate(-1px,-2px);pointer-events:none}
  select#lang{appearance:none;-webkit-appearance:none;font-family:var(--font-ui);font-weight:500;
    font-size:var(--text-base);color:var(--ink);background:var(--paper-1);
    border:1px solid var(--line-2);border-radius:var(--radius-sm);padding:7px 28px 7px 11px;
    cursor:pointer;max-width:210px;transition:border-color var(--dur) var(--ease-out)}
  select#lang:hover{border-color:var(--ink-faint)}
  select#lang:focus-visible{outline:2px solid var(--focus);outline-offset:1px;border-color:transparent}
  select#lang option{background:var(--paper-1);color:var(--ink)}
  .ver{font-family:var(--font-mono);font-size:var(--text-xs);color:var(--ink-faint);white-space:nowrap}
  .ver:empty{display:none}

  button{font-family:var(--font-ui);font-size:var(--text-sm);font-weight:500;
    display:inline-flex;align-items:center;gap:6px;cursor:pointer;
    transition:background var(--dur) var(--ease-out),border-color var(--dur) var(--ease-out),color var(--dur) var(--ease-out)}
  button.ghost{background:transparent;color:var(--ink-dim);border:1px solid var(--line-2);
    border-radius:var(--radius-sm);padding:6px 12px}
  button.ghost:hover{background:var(--paper-2);color:var(--ink);border-color:var(--ink-faint)}
  button.ghost:active{background:var(--paper-3)}
  button:focus-visible{outline:2px solid var(--focus);outline-offset:1px}
  button:disabled{opacity:.5;cursor:not-allowed}
  button.run{background:var(--accent);color:var(--on-accent);border:1px solid transparent;
    border-radius:var(--radius-sm);font-weight:600;padding:7px 15px}
  button.run:hover:not(:disabled){background:var(--accent-hover)}
  button.run:active:not(:disabled){transform:translateY(.5px)}
  kbd{font-family:var(--font-mono);font-size:10px;background:rgba(255,255,255,.16);
    border:1px solid rgba(255,255,255,.22);border-radius:3px;padding:1px 4px;color:var(--on-accent)}
  .icon-btn{padding:6px 9px;font-size:14px;line-height:1}

  /* ── panes (symmetric 50/50) ── */
  main{flex:1;display:flex;min-height:0}
  .pane{display:flex;flex-direction:column;min-width:0;min-height:0;flex:1 1 0;width:50%}
  #editorPane{border-right:1px solid var(--line)}
  #outPane{position:relative;background:var(--paper-0)}
  #outPane.preview-on::after{display:none}
  .pane-head{display:flex;align-items:center;gap:8px;height:36px;padding:0 var(--space-4);
    background:var(--paper-1);border-bottom:1px solid var(--line);font-family:var(--font-ui);
    font-weight:600;font-size:var(--text-xs);color:var(--ink-dim);text-transform:uppercase;letter-spacing:.07em}
  .pane-head .tag{margin-left:auto;font-family:var(--font-mono);font-weight:400;color:var(--accent);
    letter-spacing:0;text-transform:none;font-size:var(--text-xs)}
  .pane-head .tag:empty{display:none}

  #editor{flex:1;min-height:0;background:var(--editor-card)}
  #stdinWrap{border-top:1px solid var(--line);background:var(--paper-1);display:none}
  #stdinWrap.show{display:block}
  .stdin-label{font-family:var(--font-ui);font-weight:600;font-size:var(--text-xs);color:var(--ink-dim);
    letter-spacing:.06em;text-transform:uppercase;padding:9px var(--space-4) 0}
  #stdin{width:100%;height:54px;resize:vertical;background:transparent;color:var(--ink);border:0;
    padding:5px var(--space-4) 10px;font-family:var(--font-mono);font-size:12.5px;line-height:1.5}
  #stdin::placeholder{color:var(--ink-faint)}
  #stdin:focus{outline:none}

  #output{flex:1;margin:0;padding:var(--space-4);overflow:auto;font-family:var(--font-mono);
    font-size:var(--text-base);line-height:1.6;white-space:pre-wrap;word-break:break-word;
    color:var(--ink);background:var(--paper-0)}
  #output .err{color:var(--danger)}
  #output .meta{color:var(--ink-faint)}
  #output .ok{color:var(--ok)}
  #output .placeholder{color:var(--ink-faint)}
  iframe#preview{flex:1;border:0;background:#fff;width:100%}

  /* ── spinner + boot ── */
  .spin{width:14px;height:14px;border:2px solid var(--line-2);border-top-color:var(--accent);
    border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:-2px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-screen{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
    flex-direction:column;gap:13px;background:var(--paper-0)}
  .loading-screen .boot{display:flex;align-items:center;gap:9px;font-weight:600;font-size:15px;color:var(--ink)}
  .loading-screen .sub{font-family:var(--font-mono);font-size:var(--text-xs);color:var(--ink-faint)}

  @media (prefers-reduced-motion:reduce){ .spin{animation-duration:1.3s} *{transition-duration:.01ms!important} }

  @media (max-width:760px){
    main{flex-direction:column}
    .pane{width:100%}
    #editorPane{border-right:0;border-bottom:1px solid var(--line)}
    #outPane{flex:0 0 44%}
    .hide-sm{display:none}
    select#lang{max-width:150px}
  }
</style>
</head>
<body>
  <div class="loading-screen" id="loader">
    <div class="boot"><span class="spin"></span> Playground</div>
    <div class="sub">loading editor &amp; runtimes…</div>
  </div>

  <header>
    <div class="brand">
      <span class="token"></span>
      <span class="wordmark">Playground</span>
    </div>
    <span class="divider hide-sm" aria-hidden="true"></span>
    <div class="runtime">
      <span class="sel-wrap"><select id="lang" aria-label="Pilih bahasa"></select></span>
      <span class="ver" id="ver"></span>
    </div>

    <div class="spacer"></div>

    <button class="ghost icon-btn" id="themeBtn" title="Ganti tema gelap/terang" aria-label="Ganti tema">☾</button>
    <button class="ghost" id="stdinToggle" title="Toggle input (stdin)">stdin</button>
    <button class="ghost hide-sm" id="resetBtn" title="Reset ke contoh">reset</button>
    <button class="ghost hide-sm" id="shareBtn" title="Copy link berisi code">share</button>
    <button class="run" id="runBtn">Run <kbd class="hide-sm">⌘↵</kbd></button>
  </header>

  <main>
    <section class="pane" id="editorPane">
      <div class="pane-head">Editor <span class="tag" id="editorTag"></span></div>
      <div id="editor"></div>
      <div id="stdinWrap">
        <div class="stdin-label">stdin</div>
        <textarea id="stdin" placeholder="standard input — dibaca program lo…"></textarea>
      </div>
    </section>

    <section class="pane" id="outPane">
      <div class="pane-head">Output <span class="tag" id="outTag"></span></div>
      <pre id="output"><span class="placeholder">Tekan Run untuk eksekusi. Output, error &amp; exit code tampil di sini.</span></pre>
      <iframe id="preview" sandbox="allow-scripts allow-modals allow-forms allow-popups" style="display:none"></iframe>
    </section>
  </main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
<script>
const WANDBOX = 'https://wandbox.org/api';

// nama bahasa Wandbox → bahasa Monaco (highlight)
const MONACO_LANG = {
  'Bash script':'shell','C':'c','C#':'csharp','C++':'cpp','CPP':'plaintext',
  'Crystal':'plaintext','D':'plaintext','Elixir':'elixir','Erlang':'plaintext',
  'Go':'go','Groovy':'java','Haskell':'plaintext','Java':'java','JavaScript':'javascript',
  'Julia':'julia','Lazy K':'plaintext','Lisp':'plaintext','Lua':'lua','Nim':'plaintext',
  'OCaml':'plaintext','OpenSSL':'plaintext','PHP':'php','Pascal':'pascal','Perl':'perl',
  'Pony':'plaintext','Python':'python','R':'r','Ruby':'ruby','Rust':'rust','SQL':'sql',
  'Scala':'scala','Swift':'swift','TypeScript':'typescript','Vim script':'plaintext','Zig':'plaintext'
};

// urutan bahasa populer di atas
const PRI = ['JavaScript','TypeScript','Python','Ruby','Java','Go','Rust','C','C++','C#','PHP','Swift','Lua'];

// template hello-world per bahasa Wandbox
const T = {
  JavaScript:`// JavaScript (Node.js)\nconst name = "Playground";\nconsole.log(\`Halo dari \${name}!\`);\nconsole.log([1,2,3,4].map(n => n*n));`,
  TypeScript:`// TypeScript\nconst greet = (who: string): string => \`Halo, \${who}!\`;\nconsole.log(greet("Playground"));\n[1,2,3].forEach((n: number) => console.log(n, n*n));`,
  Python:`# Python 3\ndef fib(n):\n    a, b = 0, 1\n    for _ in range(n):\n        a, b = b, a + b\n    return a\n\nprint("Fibonacci:", [fib(i) for i in range(10)])`,
  Ruby:`# Ruby\nputs "Halo dari Ruby!"\n(1..5).each { |i| puts "#{i} kuadrat = #{i*i}" }`,
  Java:`// Java — class TIDAK boleh public di Wandbox (file = prog.java)\nclass Main {\n    public static void main(String[] args) {\n        System.out.println("Halo dari Java!");\n        for (int i = 1; i <= 5; i++) System.out.println(i + " -> " + (i*i));\n    }\n}`,
  Go:`// Go\npackage main\n\nimport "fmt"\n\nfunc main() {\n    fmt.Println("Halo dari Go!")\n    for i := 1; i <= 5; i++ {\n        fmt.Printf("%d kuadrat = %d\\n", i, i*i)\n    }\n}`,
  Rust:`// Rust\nfn main() {\n    println!("Halo dari Rust!");\n    for i in 1..=5 {\n        println!("{} kuadrat = {}", i, i*i);\n    }\n}`,
  C:`// C\n#include <stdio.h>\n\nint main(void) {\n    printf("Halo dari C!\\n");\n    for (int i = 1; i <= 5; i++) printf("%d -> %d\\n", i, i*i);\n    return 0;\n}`,
  'C++':`// C++\n#include <iostream>\nusing namespace std;\n\nint main() {\n    cout << "Halo dari C++!" << endl;\n    for (int i = 1; i <= 5; i++) cout << i << " -> " << i*i << endl;\n}`,
  'C#':`// C# (Mono)\nusing System;\n\nclass Program {\n    static void Main() {\n        Console.WriteLine("Halo dari C#!");\n        for (int i = 1; i <= 5; i++) Console.WriteLine($"{i} -> {i*i}");\n    }\n}`,
  PHP:`<?php\n// PHP\necho "Halo dari PHP!\\n";\nforeach (range(1,5) as $i) echo "$i kuadrat = " . ($i*$i) . "\\n";`,
  Swift:`// Swift\nprint("Halo dari Swift!")\nfor i in 1...5 { print("\\(i) -> \\(i*i)") }`,
  Lua:`-- Lua\nprint("Halo dari Lua!")\nfor i = 1, 5 do print(i .. " kuadrat = " .. i*i) end`,
  Perl:`# Perl\nprint "Halo dari Perl!\\n";\nprint "$_ kuadrat = ", $_*$_, "\\n" for (1..5);`,
  R:`# R\ncat("Halo dari R!\\n")\nfor (i in 1:5) cat(i, "kuadrat =", i*i, "\\n")`,
  'Bash script':`# Bash\necho "Halo dari Bash!"\nfor i in 1 2 3 4 5; do echo "$i kuadrat = $((i*i))"; done`,
  Scala:`// Scala\nobject Main extends App {\n  println("Halo dari Scala!")\n  (1 to 5).foreach(i => println(s"$i -> \${i*i}"))\n}`,
  Julia:`# Julia\nprintln("Halo dari Julia!")\nfor i in 1:5\n    println("$i kuadrat = $(i*i)")\nend`,
  Haskell:`-- Haskell\nmain :: IO ()\nmain = do\n  putStrLn "Halo dari Haskell!"\n  mapM_ (\\i -> putStrLn (show i ++ " -> " ++ show (i*i))) [1..5]`,
  Elixir:`# Elixir\nIO.puts "Halo dari Elixir!"\nEnum.each(1..5, fn i -> IO.puts "#{i} -> #{i*i}" end)`,
  SQL:`-- SQL (SQLite)\nSELECT 'Halo dari SQL!' AS pesan;\nWITH RECURSIVE c(x) AS (SELECT 1 UNION SELECT x+1 FROM c WHERE x<5)\nSELECT x, x*x AS kuadrat FROM c;`,
  Pascal:`program Hello;\nbegin\n  writeln('Halo dari Pascal!');\nend.`,
  Nim:`echo "Halo dari Nim!"\nfor i in 1..5: echo i, " -> ", i*i`,
  Zig:`const std = @import("std");\npub fn main() void {\n    std.debug.print("Halo dari Zig!\\n", .{});\n}`,
};

const HTML_TPL = `<!doctype html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family:Inter,-apple-system,system-ui,sans-serif;background:#fff;color:#1f2328;display:grid;place-items:center;height:100vh;margin:0">
  <div style="text-align:center">
    <h1 style="margin:0;font-size:40px;font-weight:600;letter-spacing:-.02em">Halo HTML!</h1>
    <p style="color:#6e7781;margin:10px 0 20px;font-size:15px">CSS-nya inline langsung di tag. Edit kiri, lihat hasil kanan.</p>
    <button onclick="alert('JS jalan juga \\ud83d\\udc4b')" style="padding:10px 18px;border:0;border-radius:8px;background:#2f6df6;color:#fff;font-weight:600;cursor:pointer;font-family:inherit;font-size:14px">Klik gue</button>
  </div>
</body>
</html>`;

let editor, compilerByLang = {}, current = null;
const $ = s => document.querySelector(s);
const langSel = $('#lang'), verEl = $('#ver'), outEl = $('#output'),
      iframeEl = $('#preview'), editorTag = $('#editorTag'), outTag = $('#outTag');

// ── Load Monaco robust: Blob worker (data: diblokir Chrome) + timeout + fallback
const MONACO_BASE = 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/';
let usingMonaco = false;

function loadMonaco(){
  return new Promise((resolve, reject) => {
    if (typeof require === 'undefined') return reject(new Error('AMD loader ga keload (CDN diblokir/offline?)'));
    window.MonacoEnvironment = {
      getWorkerUrl(){
        const code = `self.MonacoEnvironment={baseUrl:'${MONACO_BASE}'};importScripts('${MONACO_BASE}vs/base/worker/workerMain.js');`;
        return URL.createObjectURL(new Blob([code], { type: 'text/javascript' }));
      }
    };
    require.config({ paths: { vs: MONACO_BASE + 'vs' } });
    const to = setTimeout(() => reject(new Error('Monaco timeout 10s')), 10000);
    require(['vs/editor/editor.main'],
      () => { clearTimeout(to); resolve(true); },
      (err) => { clearTimeout(to); reject(err || new Error('Monaco module error')); });
  });
}

Promise.all([
  loadMonaco().then(() => { usingMonaco = true; }).catch(e => { console.warn('[playground] Monaco gagal, fallback textarea:', e); usingMonaco = false; }),
  fetch(`${WANDBOX}/list.json`).then(r => r.json()).catch(() => [])
]).then(([_, list]) => {
  try { init(list); }
  catch (e) { console.error('[playground] init error:', e); usingMonaco = false; try { init(list); } catch(_){} $('#loader').style.display = 'none'; }
});

// safety net: kalau apa pun nyangkut > 12s, paksa lepas loader + fallback
setTimeout(() => {
  if ($('#loader').style.display !== 'none'){
    console.warn('[playground] watchdog: paksa lepas loader');
    usingMonaco = false;
    try { init(window.__rt || []); } catch(e){ console.error(e); }
    $('#loader').style.display = 'none';
  }
}, 12000);

function makeTextareaEditor(){
  const ta = document.createElement('textarea');
  ta.spellcheck = false; ta.autocapitalize = 'off'; ta.autocomplete = 'off';
  ta.style.cssText = 'width:100%;height:100%;border:0;resize:none;background:var(--editor-card);color:var(--ink);font-family:var(--font-mono);font-size:13.5px;line-height:1.6;padding:14px 16px;outline:none';
  ta.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter'){ e.preventDefault(); run(); }
    else if (e.key === 'Tab'){ e.preventDefault(); const s=ta.selectionStart, en=ta.selectionEnd; ta.value=ta.value.slice(0,s)+'  '+ta.value.slice(en); ta.selectionStart=ta.selectionEnd=s+2; }
  });
  const host = $('#editor'); host.innerHTML = ''; host.appendChild(ta);
  return { getValue: () => ta.value, setValue: v => { ta.value = v; }, _fallback: true };
}

function setHL(mlang){ if (usingMonaco && editor && editor.getModel) { try { monaco.editor.setModelLanguage(editor.getModel(), mlang); } catch(_){} } }

let inited = false;
function init(list){
  if (inited) return;
  window.__rt = list;
  // pilih compiler default per bahasa: yang pertama & bukan build "head"
  const firstAny = {};
  for (const c of list){
    if (!firstAny[c.language]) firstAny[c.language] = c;
    if (!compilerByLang[c.language] && !/head/i.test(c.name)) compilerByLang[c.language] = c;
  }
  for (const L in firstAny) if (!compilerByLang[L]) compilerByLang[L] = firstAny[L];

  if (usingMonaco && typeof monaco !== 'undefined'){
    // custom Monaco themes — Minimal Mono (neutral + calm blue accent)
    monaco.editor.defineTheme('mono-light', {
      base:'vs', inherit:true,
      rules:[
        { token:'', foreground:'1F2328' },
        { token:'comment', foreground:'8B949E', fontStyle:'italic' },
        { token:'keyword', foreground:'2155CC' },
        { token:'keyword.control', foreground:'2155CC' },
        { token:'operator', foreground:'57606A' },
        { token:'string', foreground:'117349' },
        { token:'number', foreground:'0E7490' },
        { token:'regexp', foreground:'117349' },
        { token:'type', foreground:'7A3FB8' },
        { token:'type.identifier', foreground:'7A3FB8' },
        { token:'function', foreground:'1F2328' },
        { token:'variable', foreground:'1F2328' },
        { token:'constant', foreground:'0E7490' },
        { token:'delimiter', foreground:'6E7781' },
        { token:'tag', foreground:'2155CC' },
        { token:'attribute.name', foreground:'7A3FB8' },
        { token:'attribute.value', foreground:'117349' },
      ],
      colors:{
        'editor.background':'#FFFFFF','editor.foreground':'#1F2328',
        'editorLineNumber.foreground':'#C9D1D9','editorLineNumber.activeForeground':'#57606A',
        'editorCursor.foreground':'#2155CC','editor.selectionBackground':'#DCE7FF',
        'editor.inactiveSelectionBackground':'#DCE7FF80','editor.lineHighlightBackground':'#00000006',
        'editor.lineHighlightBorder':'#00000000','editorIndentGuide.background1':'#EDEFF2',
        'editorIndentGuide.activeBackground1':'#D8DCE1','editorWidget.background':'#FFFFFF',
        'editorWidget.border':'#E1E4E8','editorSuggestWidget.background':'#FFFFFF',
        'editorSuggestWidget.selectedBackground':'#DCE7FF','editorGutter.background':'#FFFFFF',
        'editorBracketMatch.background':'#DCE7FF','editorBracketMatch.border':'#00000000',
        'scrollbarSlider.background':'#00000014','scrollbarSlider.hoverBackground':'#00000022',
        'scrollbarSlider.activeBackground':'#0000002E',
      }
    });
    monaco.editor.defineTheme('mono-dark', {
      base:'vs-dark', inherit:true,
      rules:[
        { token:'', foreground:'E4E6EB' },
        { token:'comment', foreground:'6E7681', fontStyle:'italic' },
        { token:'keyword', foreground:'7AA2F7' },
        { token:'keyword.control', foreground:'7AA2F7' },
        { token:'operator', foreground:'9AA4B2' },
        { token:'string', foreground:'8DD6A0' },
        { token:'number', foreground:'6FD2D2' },
        { token:'regexp', foreground:'8DD6A0' },
        { token:'type', foreground:'C3A0F0' },
        { token:'type.identifier', foreground:'C3A0F0' },
        { token:'function', foreground:'E4E6EB' },
        { token:'variable', foreground:'E4E6EB' },
        { token:'constant', foreground:'6FD2D2' },
        { token:'delimiter', foreground:'8B95A1' },
        { token:'tag', foreground:'7AA2F7' },
        { token:'attribute.name', foreground:'C3A0F0' },
        { token:'attribute.value', foreground:'8DD6A0' },
      ],
      colors:{
        'editor.background':'#1A1B1F','editor.foreground':'#E4E6EB',
        'editorLineNumber.foreground':'#454B54','editorLineNumber.activeForeground':'#A0A6B0',
        'editorCursor.foreground':'#7AA2F7','editor.selectionBackground':'#2C3A57',
        'editor.inactiveSelectionBackground':'#2C3A5780','editor.lineHighlightBackground':'#FFFFFF06',
        'editor.lineHighlightBorder':'#00000000','editorIndentGuide.background1':'#2A2D33',
        'editorIndentGuide.activeBackground1':'#3A3E46','editorWidget.background':'#222428',
        'editorWidget.border':'#33363D','editorSuggestWidget.background':'#222428',
        'editorSuggestWidget.selectedBackground':'#2C3A57','editorGutter.background':'#1A1B1F',
        'editorBracketMatch.background':'#2C3A57','editorBracketMatch.border':'#00000000',
        'scrollbarSlider.background':'#FFFFFF12','scrollbarSlider.hoverBackground':'#FFFFFF20',
        'scrollbarSlider.activeBackground':'#FFFFFF28',
      }
    });
    editor = monaco.editor.create($('#editor'), {
      value:'', language:'javascript', theme: curTheme()==='dark'?'mono-dark':'mono-light', automaticLayout:true,
      fontSize:13.5, lineHeight:21, fontFamily:"'JetBrains Mono', ui-monospace, Menlo, monospace",
      fontLigatures:true, minimap:{enabled:false}, scrollBeyondLastLine:false,
      padding:{top:14}, tabSize:2, smoothScrolling:true, cursorBlinking:'smooth',
      cursorSmoothCaretAnimation:'on', renderLineHighlight:'all',
    });
    editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter, run);
  } else {
    usingMonaco = false;
    editor = makeTextareaEditor();
  }

  buildLangList();
  inited = true;
  $('#loader').style.display = 'none';
}

function buildLangList(){
  const langs = Object.keys(compilerByLang);
  const ordered = [...PRI.filter(l => langs.includes(l)),
                   ...langs.filter(l => !PRI.includes(l)).sort()];

  let html = `<option value="__html__">🌐 HTML (live preview)</option>`;
  html += `<optgroup label="Populer">`;
  let inPri = true;
  for (const l of ordered){
    if (inPri && !PRI.includes(l)){ html += `</optgroup><optgroup label="Semua bahasa">`; inPri = false; }
    html += `<option value="${escAttr(l)}">${escHtml(l)}</option>`;
  }
  html += `</optgroup>`;
  langSel.innerHTML = html;

  const shared = readHash();
  if (shared && (shared.lang === '__html__' || langs.includes(shared.lang))){
    langSel.value = shared.lang; selectLang(shared.code);
  } else {
    langSel.value = langs.includes('JavaScript') ? 'JavaScript' : (langs[0] || '__html__');
    selectLang();
  }
  langSel.addEventListener('change', () => selectLang());
}

function selectLang(forceCode){
  const l = langSel.value;
  if (l === '__html__'){
    current = { language:'__html__' };
    verEl.textContent=''; editorTag.textContent='html';
    setHL('html');
    editor.setValue(forceCode ?? HTML_TPL);
    return;
  }
  const c = compilerByLang[l];
  current = c;
  verEl.textContent = c ? 'v'+(c.version || c.name.replace(/^[^0-9]*/,'')) : '';
  const mlang = MONACO_LANG[l] || 'plaintext';
  editorTag.textContent = mlang;
  setHL(mlang);
  editor.setValue(forceCode ?? (T[l] || `# ${l}\n# Tulis code lo di sini, lalu Run ▶\n`));
}

// ── Run ──────────────────────────────────────────────────────────────────────
async function run(){
  const code = editor.getValue();
  const runBtn = $('#runBtn');

  if (current.language === '__html__'){ showPreview(code); return; }

  showText();
  outEl.innerHTML = `<span class="meta"><span class="spin"></span> Compile & run ${current.language} (${current.name})…</span>`;
  runBtn.disabled = true;
  const t0 = performance.now();

  try {
    const res = await fetch(`${WANDBOX}/compile.json`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ compiler: current.name, code, stdin: $('#stdin').value || '' })
    });
    if (!res.ok) throw new Error('HTTP '+res.status);
    const d = await res.json();
    const ms = Math.round(performance.now() - t0);

    outEl.innerHTML = '';
    const cErr = d.compiler_error || '';
    const out  = d.program_output || '';
    const pErr = d.program_error || '';

    if (cErr) append('err', '[compile]\n' + cErr + '\n');
    if (out)  append('', out);
    if (pErr) append('err', pErr);
    if (!cErr && !out && !pErr) append('placeholder', '(tidak ada output)');

    const ok = d.status === '0';
    append('meta', `\n${ok ? '✓' : '✗'} exit ${d.status ?? '?'}${d.signal ? ' (signal '+d.signal+')':''}  ·  ${ms}ms`);
  } catch(e){
    outEl.innerHTML = '';
    append('err', 'Network error: ' + e.message + '\n(Wandbox API mungkin lagi down / kelebihan beban — coba lagi)');
  } finally {
    runBtn.disabled = false;
  }
}

function append(cls, txt){
  const span = document.createElement('span');
  if (cls) span.className = cls;
  span.textContent = txt;
  outEl.appendChild(span);
}
function showText(){ iframeEl.style.display='none'; outEl.style.display='block'; outTag.textContent=''; $('#outPane').classList.remove('preview-on'); }
function showPreview(html){ outEl.style.display='none'; iframeEl.style.display='block'; iframeEl.srcdoc = html; outTag.textContent='live'; $('#outPane').classList.add('preview-on'); }

// ── Share via URL hash ───────────────────────────────────────────────────────
function readHash(){
  try {
    if (!location.hash.startsWith('#c=')) return null;
    const raw = decodeURIComponent(location.hash.slice(3));
    return JSON.parse(decodeURIComponent(escape(atob(raw))));
  } catch { return null; }
}
$('#shareBtn').addEventListener('click', () => {
  const payload = btoa(unescape(encodeURIComponent(JSON.stringify({ lang: langSel.value, code: editor.getValue() }))));
  const url = `${location.origin}${location.pathname}#c=${encodeURIComponent(payload)}`;
  navigator.clipboard.writeText(url).then(() => {
    const b = $('#shareBtn'); const o = b.textContent; b.textContent='✓ Copied!';
    setTimeout(() => b.textContent = o, 1400);
  });
});

// ── theme toggle (dark/light) ────────────────────────────────────────────────
function curTheme(){ return document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light'; }
function applyTheme(t){
  document.documentElement.setAttribute('data-theme', t);
  try { localStorage.setItem('pg-theme', t); } catch(_){}
  const b = $('#themeBtn'); if (b) b.textContent = t === 'dark' ? '☀' : '☾';
  if (usingMonaco && typeof monaco !== 'undefined') monaco.editor.setTheme(t === 'dark' ? 'mono-dark' : 'mono-light');
}
$('#themeBtn').addEventListener('click', () => applyTheme(curTheme() === 'dark' ? 'light' : 'dark'));
$('#themeBtn').textContent = curTheme() === 'dark' ? '☀' : '☾';

// ── helpers + buttons ────────────────────────────────────────────────────────
function escHtml(s){ return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
function escAttr(s){ return s.replace(/"/g,'&quot;'); }
$('#runBtn').addEventListener('click', run);
$('#resetBtn').addEventListener('click', () => selectLang());
$('#stdinToggle').addEventListener('click', () => $('#stdinWrap').classList.toggle('show'));
</script>
