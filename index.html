<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Playground · Code Runner</title>
<meta name="description" content="Online code playground — tulis & jalanin code di 35+ bahasa: JavaScript, Python, Ruby, Java, Go, Rust, C, C++, C#, PHP, dan banyak lagi. Plus live preview HTML." />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%23F6F1E2'/%3E%3Crect x='7' y='7' width='86' height='86' rx='13' fill='none' stroke='%232A2620' stroke-width='6'/%3E%3Ccircle cx='50' cy='50' r='23' fill='%23ed1b24' stroke='%232A2620' stroke-width='6'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Libre+Franklin:wght@400;500;600;700&family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet" />
<script>try{document.documentElement.setAttribute('data-theme',localStorage.getItem('pg-theme')||'light')}catch(e){document.documentElement.setAttribute('data-theme','light')}</script>
<style>
  /* Hallmark · macrostructure: Workbench (tool shell) · genre: editorial/playful
   * theme: custom "Monopoly board" — cream board + black rules + Monopoly red
   *   + 8-colour property strip · dark mode = box-green night · light & dark toggle
   *   · Archivo Black + Libre Franklin + JetBrains Mono · anchor hue: red 27
   * pre-emit critique: P5 H5 E5 S5 R4 V5
   */
  :root{
    /* ── light: the board ── */
    --paper-0:oklch(95.5% .018 92);  --paper-1:oklch(97.6% .012 95);  --paper-2:oklch(99.2% .006 95);
    --ink:oklch(24% .015 70);        --ink-dim:oklch(44% .02 60);     --ink-faint:oklch(57% .02 70);
    --rule:oklch(24% .015 70);       --line-soft:oklch(84% .012 92);
    --accent:oklch(57% .21 27);      --on-accent:oklch(99% 0 0);      --shadow:oklch(24% .015 70);
    --editor-card:var(--paper-2);    --focus:oklch(57% .21 27);
    /* ── property colours (brand — shared both modes) ── */
    --p-brown:#955436; --p-sky:#aae0fa; --p-pink:#d93a96; --p-orange:#f7941d;
    --p-red:#ed1b24; --p-yellow:#fcdb1f; --p-green:#1fb25a; --p-blue:#0072bb;
    /* type */
    --font-display:'Archivo Black',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    --font-ui:'Libre Franklin',-apple-system,system-ui,sans-serif;
    --font-mono:'JetBrains Mono',ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace;
    /* space + text */
    --space-1:4px; --space-2:8px; --space-3:12px; --space-4:16px; --space-5:20px; --space-6:24px;
    --text-xs:11px; --text-sm:12px; --text-base:13px; --text-md:14px;
    --radius-sm:4px; --radius:6px;
    --ease-out:cubic-bezier(.2,.7,.2,1); --dur:.14s;
  }
  [data-theme="dark"]{
    /* ── dark: the box lid (deep Monopoly green night) ── */
    --paper-0:oklch(24% .03 162);    --paper-1:oklch(28% .03 162);    --paper-2:oklch(31% .032 162);
    --ink:oklch(94% .015 95);        --ink-dim:oklch(74% .018 95);    --ink-faint:oklch(62% .02 120);
    --rule:oklch(82% .03 95);        --line-soft:oklch(40% .03 162);
    --accent:oklch(64% .2 28);       --on-accent:oklch(99% 0 0);      --shadow:oklch(13% .02 162);
    --editor-card:oklch(26% .03 162);--focus:oklch(72% .18 28);
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;overflow-x:clip}
  body{background:var(--paper-0);color:var(--ink);font-family:var(--font-ui);
    display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased;
    transition:background .25s var(--ease-out),color .25s var(--ease-out)}

  /* ── property colour strip (signature) ── */
  .strip{display:flex;height:6px;flex:0 0 auto}
  .strip i{flex:1}
  .strip i:nth-child(1){background:var(--p-brown)} .strip i:nth-child(2){background:var(--p-sky)}
  .strip i:nth-child(3){background:var(--p-pink)}  .strip i:nth-child(4){background:var(--p-orange)}
  .strip i:nth-child(5){background:var(--p-red)}   .strip i:nth-child(6){background:var(--p-yellow)}
  .strip i:nth-child(7){background:var(--p-green)} .strip i:nth-child(8){background:var(--p-blue)}

  /* ── header ── */
  header{display:flex;align-items:center;gap:var(--space-4);padding:0 var(--space-5);
    min-height:60px;flex:0 0 auto;flex-wrap:wrap;background:var(--paper-1);border-bottom:2px solid var(--rule)}
  .brand{display:flex;align-items:center;gap:11px;white-space:nowrap}
  .brand .token{width:21px;height:21px;border-radius:50%;background:var(--accent);
    border:2px solid var(--rule);box-shadow:1.5px 1.5px 0 var(--shadow)}
  .wordmark{font-family:var(--font-display);font-size:19px;letter-spacing:.01em;
    text-transform:uppercase;color:var(--accent);line-height:1}
  .spacer{flex:1}

  .runtime{display:flex;align-items:center;gap:10px}
  .runtime .lbl{font-family:var(--font-mono);font-size:var(--text-xs);color:var(--ink-faint);
    letter-spacing:.08em;text-transform:uppercase}
  .sel-wrap{position:relative;display:inline-flex;align-items:center}
  .sel-wrap::after{content:'▾';position:absolute;right:11px;color:var(--accent);font-size:10px;pointer-events:none}
  select#lang{appearance:none;-webkit-appearance:none;font-family:var(--font-ui);font-weight:600;
    font-size:var(--text-base);color:var(--ink);background:var(--paper-2);
    border:2px solid var(--rule);border-radius:var(--radius-sm);padding:7px 30px 7px 12px;
    cursor:pointer;max-width:230px;box-shadow:1.5px 1.5px 0 var(--shadow);transition:transform var(--dur) var(--ease-out),box-shadow var(--dur) var(--ease-out)}
  select#lang:hover{transform:translate(-1px,-1px);box-shadow:2.5px 2.5px 0 var(--shadow)}
  select#lang:focus-visible{outline:2px solid var(--focus);outline-offset:2px}
  select#lang option{background:var(--paper-2);color:var(--ink)}
  .ver{font-family:var(--font-mono);font-size:var(--text-xs);font-weight:700;color:#1a1a1a;
    letter-spacing:.02em;white-space:nowrap;padding:3px 8px;border-radius:3px;
    border:1.5px solid var(--rule);background:var(--p-yellow)}
  .ver:empty{display:none}

  button{font-family:var(--font-ui);font-size:var(--text-sm);font-weight:600;
    display:inline-flex;align-items:center;gap:7px;cursor:pointer;
    transition:transform var(--dur) var(--ease-out),box-shadow var(--dur) var(--ease-out),background var(--dur) var(--ease-out)}
  button.ghost{background:var(--paper-2);color:var(--ink);border:2px solid var(--rule);
    border-radius:var(--radius-sm);padding:6px 13px;box-shadow:1.5px 1.5px 0 var(--shadow)}
  button.ghost:hover{transform:translate(-1px,-1px);box-shadow:2.5px 2.5px 0 var(--shadow)}
  button.ghost:active{transform:translate(1px,1px);box-shadow:0 0 0 var(--shadow)}
  button:focus-visible{outline:2px solid var(--focus);outline-offset:2px}
  button:disabled{opacity:.5;cursor:not-allowed;box-shadow:none;transform:none}
  button.run{background:var(--accent);color:var(--on-accent);border:2px solid var(--rule);
    border-radius:var(--radius-sm);font-family:var(--font-display);text-transform:uppercase;
    letter-spacing:.04em;padding:7px 18px;box-shadow:2px 2px 0 var(--shadow)}
  button.run:hover:not(:disabled){transform:translate(-1px,-1px);box-shadow:3px 3px 0 var(--shadow)}
  button.run:active:not(:disabled){transform:translate(2px,2px);box-shadow:0 0 0 var(--shadow)}
  kbd{font-family:var(--font-mono);font-size:10px;background:rgba(0,0,0,.2);
    border:1px solid rgba(0,0,0,.32);border-radius:3px;padding:1px 5px;color:var(--on-accent)}
  .icon-btn{font-size:15px;padding:5px 10px;line-height:1}

  /* ── panes ── */
  main{flex:1;display:flex;min-height:0}
  .pane{display:flex;flex-direction:column;min-width:0;min-height:0}
  #editorPane{flex:1;border-right:2px solid var(--rule)}
  #outPane{position:relative;width:42%;min-width:300px;background:var(--paper-0)}
  #outPane.preview-on::after{display:none}
  .pane-head{display:flex;align-items:center;gap:10px;height:38px;padding:0 var(--space-4);
    background:var(--paper-1);border-bottom:2px solid var(--rule);font-family:var(--font-display);
    font-size:var(--text-xs);color:var(--ink);text-transform:uppercase;letter-spacing:.1em}
  .pane-head .chip{width:13px;height:13px;border:1.5px solid var(--rule);border-radius:2px}
  .pane-head .chip.ed{background:var(--p-blue)}
  .pane-head .chip.out{background:var(--p-red)}
  .pane-head .tag{margin-left:auto;font-family:var(--font-mono);font-weight:700;color:var(--accent);
    letter-spacing:.04em;text-transform:none;font-size:var(--text-xs)}
  .pane-head .tag:empty{display:none}

  #editor{flex:1;min-height:0;background:var(--editor-card)}
  #stdinWrap{border-top:2px solid var(--rule);background:var(--paper-1);display:none}
  #stdinWrap.show{display:block}
  .stdin-label{font-family:var(--font-display);font-size:var(--text-xs);color:var(--ink);
    letter-spacing:.08em;text-transform:uppercase;padding:8px var(--space-4) 0}
  .stdin-label::before{content:'▸ ';color:var(--accent)}
  #stdin{width:100%;height:56px;resize:vertical;background:transparent;color:var(--ink);border:0;
    padding:5px var(--space-4) 10px;font-family:var(--font-mono);font-size:12.5px;line-height:1.5}
  #stdin::placeholder{color:var(--ink-faint)}
  #stdin:focus{outline:none}

  #output{flex:1;margin:0;padding:var(--space-4);overflow:auto;font-family:var(--font-mono);
    font-size:var(--text-base);line-height:1.62;white-space:pre-wrap;word-break:break-word;
    color:var(--ink);background:var(--paper-0)}
  #output .err{color:var(--accent)}
  #output .meta{color:var(--ink-faint)}
  #output .ok{color:var(--p-green)}
  [data-theme="dark"] #output .ok{color:oklch(80% .16 150)}
  #output .placeholder{color:var(--ink-faint)}
  iframe#preview{flex:1;border:0;background:#fff;width:100%}

  /* ── spinner + boot screen ────────────────────────────────────────── */
  .spin{width:14px;height:14px;border:2.5px solid var(--line-soft);border-top-color:var(--accent);
    border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:-2px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-screen{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
    flex-direction:column;gap:16px;background:var(--paper-0)}
  .loading-screen .strip{width:min(320px,68vw);height:14px;border:2px solid var(--rule);border-radius:3px}
  .loading-screen .boot{font-family:var(--font-display);font-size:16px;color:var(--accent);
    letter-spacing:.12em;text-transform:uppercase}
  .loading-screen .sub{display:flex;align-items:center;gap:8px;font-family:var(--font-mono);
    font-size:var(--text-xs);color:var(--ink-faint);letter-spacing:.16em;text-transform:uppercase}

  @media (prefers-reduced-motion:reduce){ .spin{animation-duration:1.3s} *{transition-duration:.01ms!important} }

  @media (max-width:760px){
    header{min-height:auto;padding:9px var(--space-4);gap:9px}
    .runtime .lbl{display:none}
    main{flex-direction:column}
    #editorPane{border-right:0;border-bottom:2px solid var(--rule)}
    #outPane{width:100%;min-width:0;height:44%}
    .hide-sm{display:none}
    select#lang{max-width:148px}
    .wordmark{font-size:16px}
  }
</style>
</head>
<body>
  <div class="loading-screen" id="loader">
    <div class="boot">Playground</div>
    <div class="strip"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
    <div class="sub"><span class="spin"></span> shuffling the deck…</div>
  </div>

  <header>
    <div class="brand">
      <span class="token"></span>
      <span class="wordmark">Playground</span>
    </div>

    <div class="runtime">
      <span class="lbl hide-sm">runtime</span>
      <span class="sel-wrap"><select id="lang" aria-label="Pilih bahasa"></select></span>
      <span class="ver" id="ver"></span>
    </div>

    <div class="spacer"></div>

    <button class="ghost icon-btn" id="themeBtn" title="Ganti tema gelap/terang" aria-label="Ganti tema">☾</button>
    <button class="ghost" id="stdinToggle" title="Toggle input (stdin)">stdin</button>
    <button class="ghost hide-sm" id="resetBtn" title="Reset ke contoh">reset</button>
    <button class="ghost hide-sm" id="shareBtn" title="Copy link berisi code">share</button>
    <button class="run" id="runBtn">Run <kbd class="hide-sm">⌘↵</kbd></button>
  </header>

  <div class="strip" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>

  <main>
    <section class="pane" id="editorPane">
      <div class="pane-head"><span class="chip ed"></span> Editor <span class="tag" id="editorTag"></span></div>
      <div id="editor"></div>
      <div id="stdinWrap">
        <div class="stdin-label">standard input</div>
        <textarea id="stdin" placeholder="dibaca program lo lewat stdin…"></textarea>
      </div>
    </section>

    <section class="pane" id="outPane">
      <div class="pane-head"><span class="chip out"></span> Output <span class="tag" id="outTag"></span></div>
      <pre id="output"><span class="placeholder">▸ Tekan Run buat eksekusi — output, error & exit code tampil di sini.</span></pre>
      <iframe id="preview" sandbox="allow-scripts allow-modals allow-forms allow-popups" style="display:none"></iframe>
    </section>
  </main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
<script>
const WANDBOX = 'https://wandbox.org/api';

// nama bahasa Wandbox → bahasa Monaco (highlight)
const MONACO_LANG = {
  'Bash script':'shell','C':'c','C#':'csharp','C++':'cpp','CPP':'plaintext',
  'Crystal':'plaintext','D':'plaintext','Elixir':'elixir','Erlang':'plaintext',
  'Go':'go','Groovy':'java','Haskell':'plaintext','Java':'java','JavaScript':'javascript',
  'Julia':'julia','Lazy K':'plaintext','Lisp':'plaintext','Lua':'lua','Nim':'plaintext',
  'OCaml':'plaintext','OpenSSL':'plaintext','PHP':'php','Pascal':'pascal','Perl':'perl',
  'Pony':'plaintext','Python':'python','R':'r','Ruby':'ruby','Rust':'rust','SQL':'sql',
  'Scala':'scala','Swift':'swift','TypeScript':'typescript','Vim script':'plaintext','Zig':'plaintext'
};

// urutan bahasa populer di atas
const PRI = ['JavaScript','TypeScript','Python','Ruby','Java','Go','Rust','C','C++','C#','PHP','Swift','Lua'];

// template hello-world per bahasa Wandbox
const T = {
  JavaScript:`// JavaScript (Node.js)\nconst name = "Playground";\nconsole.log(\`Halo dari \${name}!\`);\nconsole.log([1,2,3,4].map(n => n*n));`,
  TypeScript:`// TypeScript\nconst greet = (who: string): string => \`Halo, \${who}!\`;\nconsole.log(greet("Playground"));\n[1,2,3].forEach((n: number) => console.log(n, n*n));`,
  Python:`# Python 3\ndef fib(n):\n    a, b = 0, 1\n    for _ in range(n):\n        a, b = b, a + b\n    return a\n\nprint("Fibonacci:", [fib(i) for i in range(10)])`,
  Ruby:`# Ruby\nputs "Halo dari Ruby!"\n(1..5).each { |i| puts "#{i} kuadrat = #{i*i}" }`,
  Java:`// Java — class TIDAK boleh public di Wandbox (file = prog.java)\nclass Main {\n    public static void main(String[] args) {\n        System.out.println("Halo dari Java!");\n        for (int i = 1; i <= 5; i++) System.out.println(i + " -> " + (i*i));\n    }\n}`,
  Go:`// Go\npackage main\n\nimport "fmt"\n\nfunc main() {\n    fmt.Println("Halo dari Go!")\n    for i := 1; i <= 5; i++ {\n        fmt.Printf("%d kuadrat = %d\\n", i, i*i)\n    }\n}`,
  Rust:`// Rust\nfn main() {\n    println!("Halo dari Rust!");\n    for i in 1..=5 {\n        println!("{} kuadrat = {}", i, i*i);\n    }\n}`,
  C:`// C\n#include <stdio.h>\n\nint main(void) {\n    printf("Halo dari C!\\n");\n    for (int i = 1; i <= 5; i++) printf("%d -> %d\\n", i, i*i);\n    return 0;\n}`,
  'C++':`// C++\n#include <iostream>\nusing namespace std;\n\nint main() {\n    cout << "Halo dari C++!" << endl;\n    for (int i = 1; i <= 5; i++) cout << i << " -> " << i*i << endl;\n}`,
  'C#':`// C# (Mono)\nusing System;\n\nclass Program {\n    static void Main() {\n        Console.WriteLine("Halo dari C#!");\n        for (int i = 1; i <= 5; i++) Console.WriteLine($"{i} -> {i*i}");\n    }\n}`,
  PHP:`<?php\n// PHP\necho "Halo dari PHP!\\n";\nforeach (range(1,5) as $i) echo "$i kuadrat = " . ($i*$i) . "\\n";`,
  Swift:`// Swift\nprint("Halo dari Swift!")\nfor i in 1...5 { print("\\(i) -> \\(i*i)") }`,
  Lua:`-- Lua\nprint("Halo dari Lua!")\nfor i = 1, 5 do print(i .. " kuadrat = " .. i*i) end`,
  Perl:`# Perl\nprint "Halo dari Perl!\\n";\nprint "$_ kuadrat = ", $_*$_, "\\n" for (1..5);`,
  R:`# R\ncat("Halo dari R!\\n")\nfor (i in 1:5) cat(i, "kuadrat =", i*i, "\\n")`,
  'Bash script':`# Bash\necho "Halo dari Bash!"\nfor i in 1 2 3 4 5; do echo "$i kuadrat = $((i*i))"; done`,
  Scala:`// Scala\nobject Main extends App {\n  println("Halo dari Scala!")\n  (1 to 5).foreach(i => println(s"$i -> \${i*i}"))\n}`,
  Julia:`# Julia\nprintln("Halo dari Julia!")\nfor i in 1:5\n    println("$i kuadrat = $(i*i)")\nend`,
  Haskell:`-- Haskell\nmain :: IO ()\nmain = do\n  putStrLn "Halo dari Haskell!"\n  mapM_ (\\i -> putStrLn (show i ++ " -> " ++ show (i*i))) [1..5]`,
  Elixir:`# Elixir\nIO.puts "Halo dari Elixir!"\nEnum.each(1..5, fn i -> IO.puts "#{i} -> #{i*i}" end)`,
  SQL:`-- SQL (SQLite)\nSELECT 'Halo dari SQL!' AS pesan;\nWITH RECURSIVE c(x) AS (SELECT 1 UNION SELECT x+1 FROM c WHERE x<5)\nSELECT x, x*x AS kuadrat FROM c;`,
  Pascal:`program Hello;\nbegin\n  writeln('Halo dari Pascal!');\nend.`,
  Nim:`echo "Halo dari Nim!"\nfor i in 1..5: echo i, " -> ", i*i`,
  Zig:`const std = @import("std");\npub fn main() void {\n    std.debug.print("Halo dari Zig!\\n", .{});\n}`,
};

const HTML_TPL = `<!doctype html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family:Georgia,'Times New Roman',serif;background:#F6F1E2;color:#2A2620;display:grid;place-items:center;height:100vh;margin:0">
  <div style="text-align:center;border:3px solid #2A2620;background:#fff;padding:36px 48px 30px;box-shadow:6px 6px 0 #2A2620;border-radius:4px">
    <div style="height:14px;margin:-36px -48px 24px;background:#ed1b24;border-bottom:3px solid #2A2620"></div>
    <h1 style="margin:0;font-family:Arial,Helvetica,sans-serif;font-weight:900;text-transform:uppercase;letter-spacing:.02em;font-size:38px;color:#ed1b24">Halo HTML!</h1>
    <p style="color:#6b6555;margin:10px 0 18px">CSS-nya inline langsung di tag. Edit kiri, lihat hasil kanan.</p>
    <button onclick="alert('JS jalan juga \\ud83d\\udc4b')" style="padding:11px 22px;border:3px solid #2A2620;border-radius:4px;background:#ed1b24;color:#fff;font-weight:900;text-transform:uppercase;cursor:pointer;box-shadow:3px 3px 0 #2A2620;font-family:Arial,sans-serif">Klik gue</button>
  </div>
</body>

let editor, compilerByLang = {}, current = null;
const $ = s => document.querySelector(s);
const langSel = $('#lang'), verEl = $('#ver'), outEl = $('#output'),
      iframeEl = $('#preview'), editorTag = $('#editorTag'), outTag = $('#outTag');

// ── Load Monaco robust: Blob worker (data: diblokir Chrome) + timeout + fallback
const MONACO_BASE = 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/';
let usingMonaco = false;

function loadMonaco(){
  return new Promise((resolve, reject) => {
    if (typeof require === 'undefined') return reject(new Error('AMD loader ga keload (CDN diblokir/offline?)'));
    window.MonacoEnvironment = {
      getWorkerUrl(){
        const code = `self.MonacoEnvironment={baseUrl:'${MONACO_BASE}'};importScripts('${MONACO_BASE}vs/base/worker/workerMain.js');`;
        return URL.createObjectURL(new Blob([code], { type: 'text/javascript' }));
      }
    };
    require.config({ paths: { vs: MONACO_BASE + 'vs' } });
    const to = setTimeout(() => reject(new Error('Monaco timeout 10s')), 10000);
    require(['vs/editor/editor.main'],
      () => { clearTimeout(to); resolve(true); },
      (err) => { clearTimeout(to); reject(err || new Error('Monaco module error')); });
  });
}

Promise.all([
  loadMonaco().then(() => { usingMonaco = true; }).catch(e => { console.warn('[playground] Monaco gagal, fallback textarea:', e); usingMonaco = false; }),
  fetch(`${WANDBOX}/list.json`).then(r => r.json()).catch(() => [])
]).then(([_, list]) => {
  try { init(list); }
  catch (e) { console.error('[playground] init error:', e); usingMonaco = false; try { init(list); } catch(_){} $('#loader').style.display = 'none'; }
});

// safety net: kalau apa pun nyangkut > 12s, paksa lepas loader + fallback
setTimeout(() => {
  if ($('#loader').style.display !== 'none'){
    console.warn('[playground] watchdog: paksa lepas loader');
    usingMonaco = false;
    try { init(window.__rt || []); } catch(e){ console.error(e); }
    $('#loader').style.display = 'none';
  }
}, 12000);

function makeTextareaEditor(){
  const ta = document.createElement('textarea');
  ta.spellcheck = false; ta.autocapitalize = 'off'; ta.autocomplete = 'off';
  ta.style.cssText = 'width:100%;height:100%;border:0;resize:none;background:var(--editor-card);color:var(--ink);font-family:var(--font-mono);font-size:13.5px;line-height:1.6;padding:14px 16px;outline:none';
  ta.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter'){ e.preventDefault(); run(); }
    else if (e.key === 'Tab'){ e.preventDefault(); const s=ta.selectionStart, en=ta.selectionEnd; ta.value=ta.value.slice(0,s)+'  '+ta.value.slice(en); ta.selectionStart=ta.selectionEnd=s+2; }
  });
  const host = $('#editor'); host.innerHTML = ''; host.appendChild(ta);
  return { getValue: () => ta.value, setValue: v => { ta.value = v; }, _fallback: true };
}

function setHL(mlang){ if (usingMonaco && editor && editor.getModel) { try { monaco.editor.setModelLanguage(editor.getModel(), mlang); } catch(_){} } }

let inited = false;

  if (inited) return;
  window.__rt = list;
  // pilih compiler default per bahasa: yang pertama & bukan build "head"
  const firstAny = {};
  for (const c of list){
    if (!firstAny[c.language]) firstAny[c.language] = c;
    if (!compilerByLang[c.language] && !/head/i.test(c.name)) compilerByLang[c.language] = c;
  }
  for (const L in firstAny) if (!compilerByLang[L]) compilerByLang[L] = firstAny[L];

  if (usingMonaco && typeof monaco !== 'undefined'){
    // custom Monaco themes — match palette Monopoly (light board + dark box-green)
    monaco.editor.defineTheme('board-light', {

        { token:'operator', foreground:'C8102E' },

        { token:'number', foreground:'0B6FA4' },
        { token:'regexp', foreground:'1B7A43' },
        { token:'type', foreground:'9C5A1C' },
        { token:'type.identifier', foreground:'9C5A1C' },
        { token:'function', foreground:'2A2620' },
        { token:'variable', foreground:'2A2620' },
        { token:'constant', foreground:'0B6FA4' },
        { token:'delimiter', foreground:'7C7669' },
        { token:'tag', foreground:'C8102E' },
        { token:'attribute.name', foreground:'9C5A1C' },
        { token:'attribute.value', foreground:'1B7A43' },
      ],
      colors:{
        'editor.background':'#FBF7EC','editor.foreground':'#2A2620',
        'editorLineNumber.foreground':'#C2B89F','editorLineNumber.activeForeground':'#C8102E',
        'editorCursor.foreground':'#C8102E','editor.selectionBackground':'#FBE39A',
        'editor.inactiveSelectionBackground':'#FBE39A66','editor.lineHighlightBackground':'#00000008',
        'editor.lineHighlightBorder':'#00000000','editorIndentGuide.background1':'#E7DFC9',
        'editorIndentGuide.activeBackground1':'#CFC4A6','editorWidget.background':'#FBF7EC',
        'editorWidget.border':'#2A2620','editorSuggestWidget.background':'#FBF7EC',
        'editorSuggestWidget.selectedBackground':'#FBE39A','editorGutter.background':'#FBF7EC',
        'editorBracketMatch.background':'#FBE39A','editorBracketMatch.border':'#00000000',
        'scrollbarSlider.background':'#0000001A','scrollbarSlider.hoverBackground':'#00000028',
        'scrollbarSlider.activeBackground':'#00000033',
      }
    });
    monaco.editor.defineTheme('board-dark', {
      base:'vs-dark', inherit:true,
      rules:[
        { token:'', foreground:'ECE7D6' },
        { token:'comment', foreground:'7E8C82', fontStyle:'italic' },
        { token:'keyword', foreground:'FF7A6B' },
        { token:'keyword.control', foreground:'FF7A6B' },
        { token:'operator', foreground:'FF7A6B' },
        { token:'string', foreground:'8FCF9F' },
        { token:'number', foreground:'7FC0E8' },
        { token:'regexp', foreground:'8FCF9F' },
        { token:'type', foreground:'E6B873' },
        { token:'type.identifier', foreground:'E6B873' },
        { token:'function', foreground:'ECE7D6' },
        { token:'variable', foreground:'ECE7D6' },
        { token:'constant', foreground:'7FC0E8' },
        { token:'delimiter', foreground:'9AA89E' },
        { token:'tag', foreground:'FF7A6B' },
        { token:'attribute.name', foreground:'E6B873' },
        { token:'attribute.value', foreground:'8FCF9F' },
      ],
      colors:{
        'editor.background':'#1E2C26','editor.foreground':'#ECE7D6',
        'editorLineNumber.foreground':'#566B5F','editorLineNumber.activeForeground':'#FF7A6B',
        'editorCursor.foreground':'#FF7A6B','editor.selectionBackground':'#3E5A4C',
        'editor.inactiveSelectionBackground':'#3E5A4C80','editor.lineHighlightBackground':'#FFFFFF08',
        'editor.lineHighlightBorder':'#00000000','editorIndentGuide.background1':'#2C3E35',
        'editorIndentGuide.activeBackground1':'#3E5446','editorWidget.background':'#243429',
        'editorWidget.border':'#3A4D42','editorSuggestWidget.background':'#243429',
        'editorSuggestWidget.selectedBackground':'#3E5A4C','editorGutter.background':'#1E2C26',
        'editorBracketMatch.background':'#3E5A4C','editorBracketMatch.border':'#00000000',
        'scrollbarSlider.background':'#FFFFFF12','scrollbarSlider.hoverBackground':'#FFFFFF20',
        'scrollbarSlider.activeBackground':'#FFFFFF28',
      }
    });
    editor = monaco.editor.create($('#editor'), {
      value:'', language:'javascript', theme: curTheme()==='dark'?'board-dark':'board-light', automaticLayout:true,
      fontSize:13.5, lineHeight:21, fontFamily:"'JetBrains Mono', ui-monospace, Menlo, monospace",
      fontLigatures:true, minimap:{enabled:false}, scrollBeyondLastLine:false,

      cursorSmoothCaretAnimation:'on', renderLineHighlight:'all',

  } else {
    usingMonaco = false;
    editor = makeTextareaEditor();
  }

  buildLangList();
  inited = true;
  $('#loader').style.display = 'none';

function buildLangList(){
  const langs = Object.keys(compilerByLang);
  const ordered = [...PRI.filter(l => langs.includes(l)),
                   ...langs.filter(l => !PRI.includes(l)).sort()];

  let html = `<option value="__html__">🌐 HTML (live preview)</option>`;
  html += `<optgroup label="Populer">`;
  let inPri = true;
  for (const l of ordered){
    if (inPri && !PRI.includes(l)){ html += `</optgroup><optgroup label="Semua bahasa">`; inPri = false; }
    html += `<option value="${escAttr(l)}">${escHtml(l)}</option>`;
  }
  html += `</optgroup>`;
  langSel.innerHTML = html;

  const shared = readHash();
  if (shared && (shared.lang === '__html__' || langs.includes(shared.lang))){
    langSel.value = shared.lang; selectLang(shared.code);
  } else {
    langSel.value = langs.includes('JavaScript') ? 'JavaScript' : (langs[0] || '__html__');
    selectLang();
  }
  langSel.addEventListener('change', () => selectLang());
}

function selectLang(forceCode){
  const l = langSel.value;
  if (l === '__html__'){
    current = { language:'__html__' };
    verEl.textContent=''; editorTag.textContent='html';
    setHL('html');
    editor.setValue(forceCode ?? HTML_TPL);
    return;
  }
  const c = compilerByLang[l];
  current = c;
  verEl.textContent = c ? 'v'+(c.version || c.name.replace(/^[^0-9]*/,'')) : '';
  const mlang = MONACO_LANG[l] || 'plaintext';
  editorTag.textContent = mlang;
  setHL(mlang);
  editor.setValue(forceCode ?? (T[l] || `# ${l}\n# Tulis code lo di sini, lalu Run ▶\n`));
}

// ── Run ──────────────────────────────────────────────────────────────────────
async function run(){
  const code = editor.getValue();
  const runBtn = $('#runBtn');

  if (current.language === '__html__'){ showPreview(code); return; }

  showText();
  outEl.innerHTML = `<span class="meta"><span class="spin"></span> Compile & run ${current.language} (${current.name})…</span>`;
  runBtn.disabled = true;
  const t0 = performance.now();

  try {
    const res = await fetch(`${WANDBOX}/compile.json`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ compiler: current.name, code, stdin: $('#stdin').value || '' })
    });
    if (!res.ok) throw new Error('HTTP '+res.status);
    const d = await res.json();
    const ms = Math.round(performance.now() - t0);

    outEl.innerHTML = '';
    const cErr = d.compiler_error || '';
    const out  = d.program_output || '';
    const pErr = d.program_error || '';

    if (cErr) append('err', '[compile]\n' + cErr + '\n');
    if (out)  append('', out);
    if (pErr) append('err', pErr);
    if (!cErr && !out && !pErr) append('placeholder', '(tidak ada output)');

    const ok = d.status === '0';
    append('meta', `\n${ok ? '✓' : '✗'} exit ${d.status ?? '?'}${d.signal ? ' (signal '+d.signal+')':''}  ·  ${ms}ms`);
  } catch(e){
    outEl.innerHTML = '';
    append('err', 'Network error: ' + e.message + '\n(Wandbox API mungkin lagi down / kelebihan beban — coba lagi)');
  } finally {
    runBtn.disabled = false;
  }
}

function append(cls, txt){
  const span = document.createElement('span');
  if (cls) span.className = cls;
  span.textContent = txt;
  outEl.appendChild(span);
}
function showText(){ iframeEl.style.display='none'; outEl.style.display='block'; outTag.textContent=''; $('#outPane').classList.remove('preview-on'); }
function showPreview(html){ outEl.style.display='none'; iframeEl.style.display='block'; iframeEl.srcdoc = html; outTag.textContent='live'; $('#outPane').classList.add('preview-on'); }

// ── Share via URL hash ───────────────────────────────────────────────────────
function readHash(){
  try {
    if (!location.hash.startsWith('#c=')) return null;
    const raw = decodeURIComponent(location.hash.slice(3));
    return JSON.parse(decodeURIComponent(escape(atob(raw))));
  } catch { return null; }
}
$('#shareBtn').addEventListener('click', () => {
  const payload = btoa(unescape(encodeURIComponent(JSON.stringify({ lang: langSel.value, code: editor.getValue() }))));
  const url = `${location.origin}${location.pathname}#c=${encodeURIComponent(payload)}`;
  navigator.clipboard.writeText(url).then(() => {
    const b = $('#shareBtn'); const o = b.textContent; b.textContent='✓ Copied!';
    setTimeout(() => b.textContent = o, 1400);
  });
});

// ── theme toggle (dark/light) ────────────────────────────────────────────────
function curTheme(){ return document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light'; }
function applyTheme(t){
  document.documentElement.setAttribute('data-theme', t);
  try { localStorage.setItem('pg-theme', t); } catch(_){}
  const b = $('#themeBtn'); if (b) b.textContent = t === 'dark' ? '☀' : '☾';
  if (usingMonaco && typeof monaco !== 'undefined') monaco.editor.setTheme(t === 'dark' ? 'board-dark' : 'board-light');
}
$('#themeBtn').addEventListener('click', () => applyTheme(curTheme() === 'dark' ? 'light' : 'dark'));
$('#themeBtn').textContent = curTheme() === 'dark' ? '☀' : '☾';

// ── helpers + buttons ────────────────────────────────────────────────────────
function escHtml(s){ return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
function escAttr(s){ return s.replace(/"/g,'&quot;'); }
$('#runBtn').addEventListener('click', run);
$('#resetBtn').addEventListener('click', () => selectLang());
$('#stdinToggle').addEventListener('click', () => $('#stdinWrap').classList.toggle('show'));
</script>
